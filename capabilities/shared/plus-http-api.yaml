          description: "Dynamically add a server to an HTTP upstream group for load balancing"
          hints:
            readOnly: false
            destructive: false
            idempotent: false
            openWorld: false
          call: "nginx-plus-api.add-http-upstream-server"
          with:
            httpUpstreamName: "tools.httpUpstreamName"
            body: "tools.body"
          outputParameters:
            - type: object
              mapping: "$."
        - name: modify-http-upstream-server
          description: "Modify configuration of a server in an HTTP upstream group (weight, max_conns, etc.)"
