              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: stream-keyvals
          path: /stream/keyvals
          description: "Stream key-value store zones"
          operations:
            - name: get-stream-keyval-zones
              method: GET
              description: "Return key-value pairs from all stream keyval zones"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: stream-keyval-zone
          path: /stream/keyvals/{streamKeyvalZoneName}
          description: "Individual stream key-value store zone"
          operations:
            - name: get-stream-keyval-zone
              method: GET
              description: "Return key-value pairs from a specific stream keyval zone"
              inputParameters:
                - name: streamKeyvalZoneName
                  in: path
                  type: string
                  required: true
                  description: "Name of the stream keyval zone"
                - name: key
                  in: query
                  type: string
                  required: false
                  description: "Key to look up in the zone"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: add-stream-keyval
              method: POST
              description: "Add a key-value pair to a stream keyval zone"
              inputParameters:
                - name: streamKeyvalZoneName
                  in: path
                  type: string
                  required: true
                  description: "Name of the stream keyval zone"
                - name: body
                  in: body
                  type: object
                  required: true
                  description: "Key-value pair to add"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: modify-stream-keyval
              method: PATCH
              description: "Modify a key-value pair or delete a key in a stream keyval zone"
              inputParameters:
                - name: streamKeyvalZoneName
                  in: path
                  type: string
                  required: true
                  description: "Name of the stream keyval zone"
                - name: body
                  in: body
                  type: object
                  required: true
                  description: "Key-value updates (set value to null to delete)"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: empty-stream-keyval-zone
              method: DELETE
              description: "Empty all key-value pairs from a stream keyval zone"
              inputParameters:
                - name: streamKeyvalZoneName
                  in: path
                  type: string
                  required: true
                  description: "Name of the stream keyval zone"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: stream-zone-sync
          path: /stream/zone_sync
          description: "Cluster zone synchronization status"
          operations:
            - name: get-stream-zone-sync
              method: GET
              description: "Return synchronization status of a cluster node"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: nginx-plus-rest
      resources:
        - path: /v1/nginx-info
          name: nginx-info
          description: "NGINX instance status and version"
          operations:
            - method: GET
              name: get-nginx-info
              description: "Get NGINX instance status"
              call: "nginx-plus-api.get-nginx-info"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/connections
          name: connections
          description: "Client connection statistics"
          operations:
            - method: GET
              name: get-connections
              description: "Get client connection statistics"
              call: "nginx-plus-api.get-connections"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/http-server-zones
          name: http-server-zones
          description: "HTTP server zone statistics"
          operations:
            - method: GET
              name: get-http-server-zones
              description: "Get all HTTP server zone statistics"
              call: "nginx-plus-api.get-http-server-zones"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/http-upstreams
          name: http-upstreams
          description: "HTTP upstream server groups"
          operations:
            - method: GET
              name: get-http-upstreams
              description: "Get all HTTP upstream server group statistics"
              call: "nginx-plus-api.get-http-upstreams"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/http-upstreams/{httpUpstreamName}/servers
          name: http-upstream-servers
          description: "Servers in an HTTP upstream group"
          operations:
            - method: GET
              name: get-http-upstream-servers
              description: "Get all servers in an HTTP upstream group"
              call: "nginx-plus-api.get-http-upstream-servers"
              with:
                httpUpstreamName: "rest.httpUpstreamName"
              outputParameters:
                - type: array
                  mapping: "$."
            - method: POST
              name: add-http-upstream-server
              description: "Add a server to an HTTP upstream group"
              call: "nginx-plus-api.add-http-upstream-server"
              with:
                httpUpstreamName: "rest.httpUpstreamName"
                body: "rest.body"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/http-upstreams/{httpUpstreamName}/servers/{httpUpstreamServerId}
          name: http-upstream-server
          description: "Individual server in an HTTP upstream group"
          operations:
            - method: GET
              name: get-http-upstream-server
              description: "Get a specific upstream server configuration"
              call: "nginx-plus-api.get-http-upstream-server"
              with:
                httpUpstreamName: "rest.httpUpstreamName"
                httpUpstreamServerId: "rest.httpUpstreamServerId"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: PATCH
              name: modify-http-upstream-server
              description: "Modify an upstream server configuration"
              call: "nginx-plus-api.modify-http-upstream-server"
              with:
                httpUpstreamName: "rest.httpUpstreamName"
                httpUpstreamServerId: "rest.httpUpstreamServerId"
                body: "rest.body"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: DELETE
              name: remove-http-upstream-server
              description: "Remove a server from an upstream group"
              call: "nginx-plus-api.remove-http-upstream-server"
              with:
                httpUpstreamName: "rest.httpUpstreamName"
                httpUpstreamServerId: "rest.httpUpstreamServerId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/http-keyvals/{httpKeyvalZoneName}
          name: http-keyval-zone
          description: "HTTP key-value store zone"
          operations:
            - method: GET
              name: get-http-keyval-zone
              description: "Get key-value pairs from an HTTP keyval zone"
              call: "nginx-plus-api.get-http-keyval-zone"
              with:
                httpKeyvalZoneName: "rest.httpKeyvalZoneName"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: add-http-keyval
              description: "Add a key-value pair to an HTTP keyval zone"
              call: "nginx-plus-api.add-http-keyval"
              with:
                httpKeyvalZoneName: "rest.httpKeyvalZoneName"
                body: "rest.body"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: PATCH
              name: modify-http-keyval
              description: "Modify a key-value pair in an HTTP keyval zone"
              call: "nginx-plus-api.modify-http-keyval"
              with:
                httpKeyvalZoneName: "rest.httpKeyvalZoneName"
                body: "rest.body"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: DELETE
              name: empty-http-keyval-zone
              description: "Empty all key-value pairs from an HTTP keyval zone"
              call: "nginx-plus-api.empty-http-keyval-zone"
              with:
                httpKeyvalZoneName: "rest.httpKeyvalZoneName"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: nginx-plus-mcp
      transport: http
      tools:
        - name: get-nginx-info
          description: "Get NGINX Plus instance status including version, build, and process information"
          hints:
            readOnly: true
            openWorld: false
          call: "nginx-plus-api.get-nginx-info"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-connections
          description: "Get current client connection statistics from NGINX Plus"
          hints:
            readOnly: true
            openWorld: false
          call: "nginx-plus-api.get-connections"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-http-requests
          description: "Get HTTP request processing statistics from NGINX Plus"
          hints:
            readOnly: true
            openWorld: false
          call: "nginx-plus-api.get-http-requests"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-http-server-zones
          description: "Get statistics for all HTTP server zones including requests, responses, and traffic"
          hints:
            readOnly: true
            openWorld: false
          call: "nginx-plus-api.get-http-server-zones"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-http-upstreams
          description: "Get status and health of all HTTP upstream server groups"
          hints:
            readOnly: true
            openWorld: false
          call: "nginx-plus-api.get-http-upstreams"
          outputParameters:
            - type: object
              mapping: "$."
