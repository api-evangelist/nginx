            openWorld: false
          call: "nginx-plus-api.modify-http-upstream-server"
          with:
            httpUpstreamName: "tools.httpUpstreamName"
            httpUpstreamServerId: "tools.httpUpstreamServerId"
            body: "tools.body"
          outputParameters:
            - type: object
              mapping: "$."
        - name: remove-http-upstream-server
          description: "Remove a server from an HTTP upstream group"
          hints:
            readOnly: false
            destructive: true
            idempotent: true
            openWorld: false
          call: "nginx-plus-api.remove-http-upstream-server"
          with:
            httpUpstreamName: "tools.httpUpstreamName"
            httpUpstreamServerId: "tools.httpUpstreamServerId"
          outputParameters:
            - type: object
              mapping: "$."
