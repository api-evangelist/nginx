            destructive: false
            idempotent: true
            openWorld: false
          call: "nginx-plus-api.modify-http-keyval"
          with:
            httpKeyvalZoneName: "tools.httpKeyvalZoneName"
            body: "tools.body"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-stream-upstreams
          description: "Get status and health of all stream (TCP/UDP) upstream server groups"
          hints:
            readOnly: true
            openWorld: false
          call: "nginx-plus-api.get-stream-upstreams"
