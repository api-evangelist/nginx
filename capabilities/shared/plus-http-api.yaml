naftiko: "1.0.0-alpha1"

info:
  label: "NGINX Plus REST API"
  description: >-
    Provides dynamic configuration and real-time monitoring of NGINX Plus
    instances via the REST API module. Supports upstream server management,
    key-value store operations, and live statistics for HTTP and stream
    server zones, caches, connections, and rate limiting.
  tags:
    - NGINX
    - Load Balancer
    - Reverse Proxy
    - Monitoring
    - Dynamic Configuration
  created: "2026-04-21"
  modified: "2026-04-21"

capability:
  consumes:
    - type: http
      namespace: nginx-plus-api
      baseUri: http://localhost/api/9
      description: "NGINX Plus REST API v9 for dynamic configuration and monitoring."
      resources:
        - name: general
          path: /
          description: "General instance information and root endpoints"
          operations:
            - name: get-api-endpoints
              method: GET
              description: "Return list of root API endpoints"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: array
                  value: "$."
        - name: nginx-info
          path: /nginx
          description: "NGINX instance status and version information"
          operations:
            - name: get-nginx-info
              method: GET
              description: "Return status of the running NGINX instance including version, build, and process IDs"
              inputParameters:
                - name: fields
                  in: query
                  type: string
                  required: false
                  description: "Comma-separated list of fields to return"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: processes
          path: /processes
          description: "Child process statistics"
          operations:
            - name: get-processes
              method: GET
              description: "Return number of abnormally terminated and respawned child processes"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: reset-processes
              method: DELETE
              description: "Reset counters of abnormally terminated and respawned child processes"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: connections
          path: /connections
          description: "Client connection statistics"
          operations:
            - name: get-connections
              method: GET
              description: "Return client connections statistics"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: reset-connections
              method: DELETE
              description: "Reset client connections statistics"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: slabs
          path: /slabs
          description: "Shared memory slab allocator statistics"
          operations:
            - name: get-slabs
              method: GET
              description: "Return status of all shared memory slab zones"
              inputParameters:
                - name: fields
                  in: query
                  type: string
                  required: false
                  description: "Comma-separated list of fields to return"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: slab-zone
          path: /slabs/{slabZoneName}
          description: "Individual slab zone statistics"
          operations:
            - name: get-slab-zone
              method: GET
              description: "Return status of a specific slab zone"
              inputParameters:
                - name: slabZoneName
                  in: path
                  type: string
                  required: true
                  description: "Name of the slab zone"
                - name: fields
                  in: query
                  type: string
                  required: false
                  description: "Comma-separated list of fields to return"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: reset-slab-zone
              method: DELETE
              description: "Reset statistics for a slab zone"
              inputParameters:
                - name: slabZoneName
                  in: path
                  type: string
                  required: true
                  description: "Name of the slab zone"
              outputRawFormat: json
              outputParameters:
