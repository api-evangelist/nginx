          description: "Get key-value pairs from a specific HTTP keyval zone"
          hints:
            readOnly: true
            openWorld: false
          call: "nginx-plus-api.get-http-keyval-zone"
          with:
            httpKeyvalZoneName: "tools.httpKeyvalZoneName"
          outputParameters:
            - type: object
              mapping: "$."
        - name: add-http-keyval
          description: "Add a key-value pair to an HTTP keyval zone for dynamic configuration"
          hints:
            readOnly: false
            destructive: false
            idempotent: false
            openWorld: false
          call: "nginx-plus-api.add-http-keyval"
          with:
            httpKeyvalZoneName: "tools.httpKeyvalZoneName"
